name: CNovalReader
options:
  bundleIdPrefix: CarryChen
  deploymentTarget:
    iOS: "17.0"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.0"

targets:
  CNovalReader:
    type: application
    platform: iOS
    sources:
      - path: CNovalReader
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: ZIPFoundation
    info:
      path: CNovalReader/Info.plist
      properties:
        CFBundleDisplayName: 小c读书
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: CarryChen.CNovalReader
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"

  CNovalReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CNovalReaderTests
    dependencies:
      - target: CNovalReader

  CNovalReaderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CNovalReaderUITests
    dependencies:
      - target: CNovalReader
